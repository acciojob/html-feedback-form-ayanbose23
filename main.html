<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>



	<style>
		body {
			font-family: Arial, sans-serif;
			background-color: #f0f4ff;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			margin: 0;
		}

		/* Form Styling */
		form {
			background: white;
			padding: 25px 30px;
			border-radius: 10px;
			width: 350px;
			box-shadow: 0 4px 10px rgba(0,0,0,0.1);
		}

		h2 {
			text-align: center;
			margin-bottom: 20px;
		}

		label {
			font-weight: bold;
			display: block;
		}

		input {
			width: 100%;
			padding: 8px;
			margin: 8px 0 15px;
			border-radius: 5px;
			border: 1px solid #ccc;
			box-sizing: border-box;
		}

		/* Special inputs */
		input[type="color"] {
			height: 40px;
			padding: 3px;
		}

		input[type="range"] {
			padding: 0;
		}

		/* Button */
		button {
			width: 100%;
			padding: 10px;
			background-color: #28a745;
			color: white;
			border: none;
			border-radius: 5px;
			cursor: pointer;
			font-size: 16px;
		}

		button:hover {
			background-color: #218838;
		}
	</style>
</head>

<body>

	<form method="post">
		<h2>Feedback Form</h2>

		<!-- Name -->
		<label for="name">Name:</label>
		<input type="text" id="name" minlength="3" maxlength="50" required>

		<!-- Portfolio -->
		<label for="portfolio">Portfolio:</label>
		<input type="url" id="portfolio" required>

		<!-- Favorite Color -->
		<label for="favColor">Favorite Color:</label>
		<input type="color" id="favColor">

		<!-- Likeness -->
		<label for="likeness">Likeness (1-100):</label>
		<input type="range" id="likeness" min="1" max="100">

		<!-- Submit -->
		<button type="submit">Submit</button>

	</form>




	
	<!-- the entire body must be written by student -->
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
